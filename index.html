  <style>
    #sb-demo-badge{position:fixed;top:8px;right:8px;z-index:99998;background:rgba(8,88,240,.92);color:#fff;
      font:700 11px/1 -apple-system,Segoe UI,Roboto,sans-serif;padding:5px 9px;border-radius:999px;

    #sb-demo-card .cred code{font-weight:700;color:#0858F0}
    #sb-demo-card button{margin-top:16px;width:100%;background:#0858F0;color:#fff;border:0;border-radius:999px;
      padding:13px;font-size:15px;font-weight:800;cursor:pointer}

  <div id="sb-demo-badge">DEMO · TEST MODE</div>
  <script>
    (function(){
      if (localStorage.getItem('sb_demo_seen')) return;
      var o=document.createElement('div'); o.id='sb-demo-ovl';
      o.innerHTML='<div id="sb-demo-card">'
        +'<div class="h">Welcome to the Storbor demo 🧪</div>'
        +'<div class="b">This is a live trial of the Storbor app. Payments run in <strong>test mode</strong> — nothing is real and no money moves.'
        +'<div class="cred">Skip sign-up — log in with:<br>Email <code>demo@storbor.com</code><br>Password <code>StorborDemo1</code></div>'
        +'Booking something? Pay with test card <strong>4242 4242 4242 4242</strong>, any future expiry, any CVC.'
        +'<button id="sb-demo-go">Start exploring</button></div>';
      document.body.appendChild(o);
      document.getElementById('sb-demo-go').onclick=function(){
        localStorage.setItem('sb_demo_seen','1'); o.remove();
      };
    })();
